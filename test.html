<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test</title>
  <link rel="stylesheet" href="assets/theme.css">
  <style>
    body {
      background-color: #f0f0f0;
      padding: 2rem;
    }
    .product-list__intro-block {
      display: flex;
      flex-direction: column;
    }
    .product-list__intro-block > * {
      flex-grow: 1;
    }
  </style>
</head>
<body>

  <div class="color-scheme color-scheme--scheme-1">
    <div class="container">
      <div class="section-spacing section-spacing--tight">
        <div class="floating-controls-container">
          <product-list class="product-list product-list--carousel scroll-area bleed md:unbleed">
            <div class="product-list__intro-block color-scheme color-scheme--scheme-1">
              <div class="@container/content-box h-full color-scheme color-scheme--scheme-2">
                <div class="content-box">
                  <div class="content-box__background-media with-overlay" style="--overlay: rgba(0,0,0,0.2);">
                    <img src="https://placehold.co/600x400" class="size-full">
                  </div>
                  <div class="place-self-center">
                    <div class="prose prose-justify-center">
                      <p class="h5">The essentials</p>
                      <p>Share details of your store's product selection, or share a story that speaks to your customers.</p>
                      <a href="#" class="button button--outline">Button</a>
                    </div>
                  </div>
                </div>
              </div>
            </div>

            <product-card class="product-card product-card--info-outside color-scheme color-scheme--scheme-1">
              <div class="product-card__figure">
                <a href="#" class="product-card__media">
                  <img src="https://placehold.co/600x400" class="product-card__image product-card__image--primary size-full object-cover aspect-square">
                </a>
              </div>
              <div class="product-card__info">
                <div class="v-stack gap-2.5 justify-items-start text-start">
                  <div class="v-stack gap-0.5">
                    <div class="v-stack gap-1">
                      <div class="v-stack gap-0.5">
                        <a href="#" class="product-title text-sm">Product Title</a>
                        <div class="product-subtitle">Subtitle</div>
                      </div>
                    </div>
                  </div>
                  <div class="v-stack gap-1">
                    <div class="price-list">
                      <span class="price-list__price">$19.99</span>
                    </div>
                  </div>
                </div>
              </div>
            </product-card>

          </product-list>
        </div>
      </div>
    </div>
  </div>

</body>
</html>
